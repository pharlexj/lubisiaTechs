openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LubisiaTech Solutions API
servers:
  - url: /api
tags:
  - name: health
  - name: services
  - name: products
  - name: orders
  - name: inquiries
  - name: stats
  - name: blog
  - name: settings
  - name: affiliate
  - name: auth
  - name: newsletter
  - name: websiteTemplates
  - name: mpesa
  - name: about
  - name: team
  - name: Storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  # ── Newsletter ────────────────────────────────────────────────────────────
  /newsletter/subscribe:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSubscribeInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscriber"
        "400":
          description: Bad request

  /newsletter/subscribers:
    get:
      operationId: listNewsletterSubscribers
      tags: [newsletter]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsletterSubscriber"

  # ── Services ──────────────────────────────────────────────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    patch:
      operationId: updateService
      tags: [services]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "204":
          description: Deleted

  # ── Products ──────────────────────────────────────────────────────────────
  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - {name: category, in: query, required: false, schema: {type: string}}
        - {name: inStock, in: query, required: false, schema: {type: boolean}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "204":
          description: Deleted

  # ── Orders ────────────────────────────────────────────────────────────────
  /orders/track:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track an order by ID and email
      parameters:
        - {name: orderId, in: query, required: true, schema: {type: integer}}
        - {name: email, in: query, required: true, schema: {type: string}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      parameters:
        - {name: status, in: query, required: false, schema: {type: string}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Inquiries ─────────────────────────────────────────────────────────────
  /inquiries:
    get:
      operationId: listInquiries
      tags: [inquiries]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inquiry"
    post:
      operationId: createInquiry
      tags: [inquiries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  /inquiries/{id}:
    patch:
      operationId: updateInquiry
      tags: [inquiries]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  # ── Stats ─────────────────────────────────────────────────────────────────
  /stats/summary:
    get:
      operationId: getSummaryStats
      tags: [stats]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryStats"

  # ── Blog ──────────────────────────────────────────────────────────────────
  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      parameters:
        - {name: published, in: query, required: false, schema: {type: boolean}}
        - {name: category, in: query, required: false, schema: {type: string}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      parameters:
        - {name: slug, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
    patch:
      operationId: updateBlogPost
      tags: [blog]
      parameters:
        - {name: slug, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      parameters:
        - {name: slug, in: path, required: true, schema: {type: string}}
      responses:
        "204":
          description: Deleted

  # ── Site Settings ─────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: listSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteSetting"

  /settings/{key}:
    get:
      operationId: getSetting
      tags: [settings]
      parameters:
        - {name: key, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSetting"
        "404":
          description: Not found
    put:
      operationId: upsertSetting
      tags: [settings]
      parameters:
        - {name: key, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSetting"

  # ── Affiliate Programs ────────────────────────────────────────────────────
  /affiliate/programs:
    get:
      operationId: listAffiliatePrograms
      tags: [affiliate]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AffiliateProgram"
    post:
      operationId: createAffiliateProgram
      tags: [affiliate]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateProgramInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateProgram"

  /affiliate/programs/{id}:
    patch:
      operationId: updateAffiliateProgram
      tags: [affiliate]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateProgramUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateProgram"
    delete:
      operationId: deleteAffiliateProgram
      tags: [affiliate]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "204":
          description: Deleted

  # ── Affiliate Links ───────────────────────────────────────────────────────
  /affiliate/links:
    get:
      operationId: listAffiliateLinks
      tags: [affiliate]
      parameters:
        - {name: programId, in: query, required: false, schema: {type: integer}}
        - {name: category, in: query, required: false, schema: {type: string}}
        - {name: featured, in: query, required: false, schema: {type: boolean}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AffiliateLink"
    post:
      operationId: createAffiliateLink
      tags: [affiliate]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateLinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateLink"

  /affiliate/links/{id}:
    patch:
      operationId: updateAffiliateLink
      tags: [affiliate]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateLinkUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AffiliateLink"
    delete:
      operationId: deleteAffiliateLink
      tags: [affiliate]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "204":
          description: Deleted

  /affiliate/links/{id}/click:
    post:
      operationId: trackAffiliateLinkClick
      tags: [affiliate]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClickTrackResponse"
        "404":
          description: Not found

  # ── Website Templates ────────────────────────────────────────────────────
  /website-templates:
    get:
      operationId: listWebsiteTemplates
      tags: [websiteTemplates]
      parameters:
        - {name: category, in: query, required: false, schema: {type: string}}
        - {name: featured, in: query, required: false, schema: {type: boolean}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebsiteTemplate"
    post:
      operationId: createWebsiteTemplate
      tags: [websiteTemplates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteTemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteTemplate"

  /website-templates/{id}:
    get:
      operationId: getWebsiteTemplate
      tags: [websiteTemplates]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteTemplate"
        "404":
          description: Not found
    patch:
      operationId: updateWebsiteTemplate
      tags: [websiteTemplates]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteTemplateUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteTemplate"
    delete:
      operationId: deleteWebsiteTemplate
      tags: [websiteTemplates]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        "204":
          description: Deleted

  # ── M-Pesa ────────────────────────────────────────────────────────────────
  /mpesa/stk-push:
    post:
      operationId: mpesaStkPush
      tags: [mpesa]
      summary: Initiate M-Pesa STK push payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaPaymentRequest"
      responses:
        "200":
          description: STK push initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaPaymentResult"
        "400":
          description: Bad request
        "503":
          description: M-Pesa not configured

  /mpesa/status:
    get:
      operationId: getMpesaStatus
      tags: [mpesa]
      summary: Check if M-Pesa is configured
      responses:
        "200":
          description: Configuration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaConfigStatus"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /about:
    get:
      operationId: listAboutSections
      tags: [about]
      summary: Get all About Us sections
      responses:
        "200":
          description: List of sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AboutSection"

  /about/{key}:
    put:
      operationId: upsertAboutSection
      tags: [about]
      summary: Create or update an About Us section
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AboutSectionBody"
      responses:
        "200":
          description: Updated section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutSection"

  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: Get all team members
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Add a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    put:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: {type: string}

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name: {type: string}
        email: {type: string}
        password: {type: string}
        newsletterSubscribed: {type: boolean}

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: {type: string}
        password: {type: string}

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: {type: string}
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id: {type: integer}
        name: {type: string}
        email: {type: string}
        role: {type: string}
        newsletterSubscribed: {type: boolean}
        createdAt: {type: string}

    NewsletterSubscribeInput:
      type: object
      required: [email]
      properties:
        email: {type: string}
        name: {type: ["string", "null"]}

    NewsletterSubscriber:
      type: object
      required: [id, email, subscribedAt]
      properties:
